<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>توالي — المستندات القانونية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0A0A; --surface:#141414; --border:#2a2a2a;
    --accent:#5588AC; --text:#f2f2f2; --text-2:#b8b8b8; --muted:#7a7a7a;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:var(--bg);color:var(--text);
    font-family:'Tajawal',Tahoma,Arial,sans-serif;
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    padding:24px;
  }
  .card{max-width:480px;width:100%;text-align:center}
  .logo{
    width:72px;height:72px;border-radius:20px;margin:0 auto 22px;
    background:rgba(85,136,172,0.14);border:1px solid rgba(85,136,172,0.30);
    display:flex;align-items:center;justify-content:center;font-size:34px;
  }
  h1{font-size:30px;font-weight:800;margin-bottom:10px}
  .sub{color:var(--text-2);font-size:15px;margin-bottom:34px}
  .links{display:flex;flex-direction:column;gap:14px}
  .link{
    display:flex;align-items:center;gap:14px;text-align:right;
    background:var(--surface);border:1px solid var(--border);
    border-radius:16px;padding:20px 22px;text-decoration:none;color:var(--text);
    transition:border-color .2s;
  }
  .link:hover{border-color:var(--accent)}
  .ic{
    width:42px;height:42px;border-radius:12px;flex-shrink:0;
    background:rgba(85,136,172,0.16);display:flex;align-items:center;
    justify-content:center;font-size:20px;
  }
  .link .t{font-weight:700;font-size:16px}
  .link .d{color:var(--muted);font-size:13px;margin-top:2px}
  .foot{color:var(--muted);font-size:12px;margin-top:30px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">ت</div>
  <h1>توالي</h1>
  <p class="sub">المستندات القانونية</p>
  <div class="links">
    <a class="link" href="privacy.html">
      <div class="ic">🛡️</div>
      <div><div class="t">سياسة الخصوصية</div><div class="d">كيف نجمع بياناتك ونحميها</div></div>
    </a>
    <a class="link" href="terms.html">
      <div class="ic">📄</div>
      <div><div class="t">شروط الاستخدام</div><div class="d">شروط وأحكام استخدام التطبيق</div></div>
    </a>
  </div>
  <div class="foot">© 2026 توالي · tawaliservice@gmail.com</div>
</div>
</body>
</html>
